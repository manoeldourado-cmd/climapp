<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adesão Pesquisa de Clima | Creditas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --green: #8EDB00; --dark: #2D3A4B; --bg: #F4F7F6; --white: #FFFFFF; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        .header { background: var(--white); padding: 20px 40px; border-bottom: 4px solid var(--green); border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 20px; align-items: end; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .filter-group label { display: block; font-size: 11px; font-weight: bold; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #CCC; background: #FFF; font-size: 13px; }
        .btn-process { background: var(--dark); color: var(--green); border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; text-align: center; border-top: 5px solid var(--green); }
        .stat-card .value { font-size: 42px; font-weight: 900; color: var(--dark); }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #EEE; }
        th { background: #F8F9FA; color: #666; font-size: 11px; text-transform: uppercase; }
        .progress-bar { background: #EEE; border-radius: 10px; height: 8px; width: 100px; display: inline-block; margin-right: 10px; }
        .progress-fill { background: var(--green); height: 100%; border-radius: 10px; transition: width 0.5s; }
    </style>
</head>
<body>

<div class="header"><h1>Monitoramento de Adesão - Pesquisa de Clima</h1></div>

<div class="container">
    <div class="card">
        <div class="upload-grid">
            <div><label>1. Base Total (CSV)</label><input type="file" id="fMestre"></div>
            <div><label>2. Base Respostas (CSV)</label><input type="file" id="fRes"></div>
            <button class="btn-process" onclick="processar()">Carregar Dashboard</button>
        </div>
    </div>

    <div class="card" id="filterArea" style="display:none">
        <div class="filter-grid">
            <div class="filter-group"><label>BU</label><select id="selBU" onchange="calcular()"></select></div>
            <div class="filter-group"><label>Nível 1</label><select id="selN1" onchange="calcular()"></select></div>
            <div class="filter-group"><label>Nível 2</label><select id="selN2" onchange="calcular()"></select></div>
            <div class="filter-group"><label>Nível 3</label><select id="selN3" onchange="calcular()"></select></div>
            <div class="filter-group"><label>Liderança</label><select id="selLid" onchange="calcular()"></select></div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>Total Alvo</h3><div class="value" id="valTotal">0</div></div>
        <div class="stat-card"><h3>Total Respondido</h3><div class="value" id="valRes">0</div></div>
        <div class="stat-card"><h3>Adesão Final</h3><div class="value" id="valPerc" style="color:#22863a">0%</div></div>
    </div>

    <div class="card" style="padding:0">
        <table id="mainTable">
            <thead><tr><th>Liderança Direta</th><th>Total Alvo</th><th>Respondidos</th><th>Adesão %</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let dataMestre = [], dataRes = [];

// Função para normalizar strings (tirar acentos, botar em minúsculo e tirar espaços)
function norm(t) {
    if (!t) return "";
    return t.toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// Função inteligente que busca a coluna correta independente de variações no nome gerado pelo sistema
function getColValue(row, possibleNames) {
    const rowKeys = Object.keys(row);
    for (let key of rowKeys) {
        const cleanKey = key.trim().toLowerCase();
        for (let possibleName of possibleNames) {
            if (cleanKey === possibleName.toLowerCase()) {
                return row[key];
            }
        }
    }
    return "";
}

async function processar() {
    const f1 = document.getElementById('fMestre').files[0];
    const f2 = document.getElementById('fRes').files[0];
    if(!f1 || !f2) return alert("Selecione os dois arquivos CSV!");

    const parse = (file) => new Promise(res => Papa.parse(file, { 
        header: true, skipEmptyLines: true, transformHeader: h => h.trim(), complete: r => res(r.data) 
    }));

    dataMestre = await parse(f1);
    dataRes = await parse(f2);

    popularDropdowns();
    document.getElementById('filterArea').style.display = 'block';
    calcular();
}

function popularDropdowns() {
    const maps = { 'selBU': 'BU', 'selN1': 'Nível 1', 'selN2': 'Nível 2', 'selN3': 'Nível 3', 'selLid': 'Liderança - Nome' };
    for (let id in maps) {
        const select = document.getElementById(id);
        const options = [...new Set(dataMestre.map(i => i[maps[id]] ? i[maps[id]].trim() : ""))].filter(Boolean).sort();
        select.innerHTML = '<option value="">Todos</option>' + options.map(o => `<option value="${o}">${o}</option>`).join('');
    }
}

function calcular() {
    const f = {
        bu: document.getElementById('selBU').value,
        n1: document.getElementById('selN1').value,
        n2: document.getElementById('selN2').value,
        n3: document.getElementById('selN3').value,
        lid: document.getElementById('selLid').value
    };

    // 1. Filtrar a Base Total (Quem DEVERIA responder)
    const mestreFiltrada = dataMestre.filter(i => 
        (!f.bu || (i['BU'] && i['BU'].trim() === f.bu)) &&
        (!f.n1 || (i['Nível 1'] && i['Nível 1'].trim() === f.n1)) &&
        (!f.n2 || (i['Nível 2'] && i['Nível 2'].trim() === f.n2)) &&
        (!f.n3 || (i['Nível 3'] && i['Nível 3'].trim() === f.n3)) &&
        (!f.lid || (i['Liderança - Nome'] && i['Liderança - Nome'].trim() === f.lid))
    );

    // 2. Filtrar a Base Respostas (Quem RESPONDEU) 
    // Usamos os possíveis nomes das colunas da exportação da sua pesquisa
    const resFiltrada = dataRes.filter(r => {
        const valBU = getColValue(r, ['BU', 'Filtro_bu']);
        const valN1 = getColValue(r, ['Filtro_hierarquia_level_1', 'Filtro_nível_1', 'Filtro_filtro_nível_1']);
        const valN2 = getColValue(r, ['Filtro_hierarquia_level_2', 'Filtro_nível_2', 'Filtro_filtro_nível_2']);
        const valN3 = getColValue(r, ['Filtro_hierarquia_level_3', 'Filtro_nível_3', 'Filtro_filtro_nível_3']);
        const valLid = getColValue(r, ['Filtro_filtro_lider_direto', 'Filtro_lider_direto', 'Liderança - Nome']);

        const matchBU = !f.bu || norm(valBU) === norm(f.bu);
        const matchN1 = !f.n1 || norm(valN1) === norm(f.n1);
        const matchN2 = !f.n2 || norm(valN2) === norm(f.n2);
        const matchN3 = !f.n3 || norm(valN3) === norm(f.n3);
        const matchLid = !f.lid || norm(valLid) === norm(f.lid);

        return matchBU && matchN1 && matchN2 && matchN3 && matchLid;
    });

    // 3. Atualizar Visuais
    document.getElementById('valTotal').innerText = mestreFiltrada.length;
    document.getElementById('valRes').innerText = resFiltrada.length;
    const p = mestreFiltrada.length ? (resFiltrada.length / mestreFiltrada.length * 100).toFixed(1) : 0;
    document.getElementById('valPerc').innerText = p + '%';

    // 4. Montar a Tabela (Apenas Líderes que fazem parte do filtro atual)
    const tbody = document.querySelector('#mainTable tbody');
    tbody.innerHTML = "";
    
    const lideres = [...new Set(mestreFiltrada.map(i => i['Liderança - Nome'] ? i['Liderança - Nome'].trim() : ""))].filter(Boolean);

    lideres.forEach(l => {
        // Quantos do time deste líder deveriam responder? (Base Total)
        const totalL = mestreFiltrada.filter(i => (i['Liderança - Nome'] && i['Liderança - Nome'].trim()) === l).length;
        
        // Quantos do time deste líder responderam? (Base Respostas)
        const feitoL = resFiltrada.filter(r => {
            const valLid = getColValue(r, ['Filtro_filtro_lider_direto', 'Filtro_lider_direto', 'Liderança - Nome']);
            return norm(valLid) === norm(l);
        }).length;

        const pL = totalL > 0 ? (feitoL / totalL * 100).toFixed(1) : 0;
        
        tbody.innerHTML += `<tr>
            <td><b>${l}</b></td>
            <td>${totalL}</td>
            <td>${feitoL}</td>
            <td><div class="progress-bar"><div class="progress-fill" style="width:${pL}%"></div></div> <b>${pL}%</b></td>
        </tr>`;
    });
}
</script>
</body>
</html>
