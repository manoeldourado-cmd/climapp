<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adesão Pesquisa de Clima | Creditas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --green: #8EDB00; --dark: #2D3A4B; --bg: #F4F7F6; --white: #FFFFFF; --text: #333; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .header { background: var(--white); padding: 20px 40px; border-bottom: 4px solid var(--green); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header h1 { margin: 0; font-size: 20px; color: var(--dark); text-transform: uppercase; }
        .container { max-width: 1200px; margin: 25px auto; padding: 0 20px; }
        
        .card { background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 20px; align-items: flex-end; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 12px; color: #777; text-transform: uppercase; }
        
        .btn { background: var(--dark); color: var(--green); border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; height: 42px; }
        .btn:hover { opacity: 0.9; }

        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #DDD; background: #FAFAFA; font-size: 13px; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 25px 0; }
        .stat-card { background: var(--white); padding: 30px; border-radius: 15px; text-align: center; border-top: 5px solid var(--green); }
        .stat-card h3 { margin: 0; font-size: 13px; color: #888; text-transform: uppercase; }
        .stat-card .value { font-size: 45px; font-weight: 900; margin: 10px 0; color: var(--dark); }

        table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 12px; overflow: hidden; }
        th { background: #F9FAFB; padding: 15px; text-align: left; font-size: 11px; text-transform: uppercase; color: #666; border-bottom: 2px solid #EEE; }
        td { padding: 15px; border-bottom: 1px solid #F1F1F1; font-size: 14px; }
        .progress-container { display: flex; align-items: center; gap: 10px; }
        .progress-bar { background: #EEE; border-radius: 10px; height: 8px; width: 100px; overflow: hidden; }
        .progress-fill { background: var(--green); height: 100%; transition: width 0.5s ease; }
    </style>
</head>
<body>

<div class="header">
    <h1>Acompanhamento de Adesão - Pesquisa de Clima</h1>
</div>

<div class="container">
    <div class="card">
        <div class="upload-grid">
            <div><label>1. Base Total (Tripulantes)</label><input type="file" id="upMestre" accept=".csv"></div>
            <div><label>2. Relatório de Respostas</label><input type="file" id="upRes" accept=".csv"></div>
            <button class="btn" onclick="iniciarProcessamento()">CARREGAR DADOS</button>
        </div>
    </div>

    <div class="card" id="areaFiltros" style="display:none">
        <div class="filter-grid">
            <div><label>BU</label><select id="sBU" onchange="atualizarFiltrosRelacionados(); calcular()"></select></div>
            <div><label>Nível 1</label><select id="sN1" onchange="calcular()"></select></div>
            <div><label>Nível 2</label><select id="sN2" onchange="calcular()"></select></div>
            <div><label>Nível 3</label><select id="sN3" onchange="calcular()"></select></div>
            <div><label>Nível 4</label><select id="sN4" onchange="calcular()"></select></div>
            <div><label>Liderança</label><select id="sLid" onchange="calcular()"></select></div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>Público Alvo</h3><div class="value" id="txtTotal">0</div></div>
        <div class="stat-card"><h3>Respondidos</h3><div class="value" id="txtFeito">0</div></div>
        <div class="stat-card"><h3>% Adesão</h3><div class="value" id="txtPerc" style="color:var(--green)">0%</div></div>
    </div>

    <div class="card" style="padding:0">
        <table>
            <thead><tr><th>Liderança Direta</th><th>Time Total</th><th>Respondidos</th><th>Status Adesão</th></tr></thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
</div>

<script>
let dadosMestre = [], dadosRes = [];

function parseCSV(file) {
    return new Promise(resolve => {
        Papa.parse(file, {
            header: true, skipEmptyLines: true, dynamicTyping: true,
            complete: results => resolve(results.data)
        });
    });
}

async function iniciarProcessamento() {
    const f1 = document.getElementById('upMestre').files[0];
    const f2 = document.getElementById('upRes').files[0];
    if(!f1 || !f2) return alert("Por favor, anexe os dois arquivos!");

    dadosMestre = await parseCSV(f1);
    dadosRes = await parseCSV(f2);

    popularFiltrosIniciais();
    document.getElementById('areaFiltros').style.display = 'block';
    calcular();
}

function popularFiltrosIniciais() {
    popularSelect('sBU', 'BU', dadosMestre);
    atualizarFiltrosRelacionados();
}

function atualizarFiltrosRelacionados() {
    const buSelecionada = document.getElementById('sBU').value;
    const dadosParaFiltros = buSelecionada ? dadosMestre.filter(i => i.BU === buSelecionada) : dadosMestre;

    popularSelect('sN1', 'Nível 1', dadosParaFiltros);
    popularSelect('sN2', 'Nível 2', dadosParaFiltros);
    popularSelect('sN3', 'Nível 3', dadosParaFiltros);
    popularSelect('sN4', 'Nível 4', dadosParaFiltros);
    popularSelect('sLid', 'Liderança - Nome', dadosParaFiltros);
}

function popularSelect(id, coluna, base) {
    const select = document.getElementById(id);
    const valores = [...new Set(base.map(i => i[coluna]))].filter(v => v && v !== "-").sort();
    const selecionadoAnterior = select.value;
    select.innerHTML = '<option value="">Todos</option>' + valores.map(v => `<option value="${v}">${v}</option>`).join('');
    if (valores.includes(selecionadoAnterior)) select.value = selecionadoAnterior;
}

function calcular() {
    const f = {
        bu: document.getElementById('sBU').value,
        n1: document.getElementById('sN1').value,
        n2: document.getElementById('sN2').value,
        n3: document.getElementById('ssN3') ? document.getElementById('sN3').value : "",
        n4: document.getElementById('sN4').value,
        lid: document.getElementById('sLid').value
    };

    // 1. Filtrar Universo de Pessoas (Base Total)
    const filtradosMestre = dadosMestre.filter(i => 
        (!f.bu || i['BU'] === f.bu) &&
        (!f.n1 || i['Nível 1'] === f.n1) &&
        (!f.n2 || i['Nível 2'] === f.n2) &&
        (!f.n4 || i['Nível 4'] === f.n4) &&
        (!f.lid || i['Liderança - Nome'] === f.lid)
    );

    // 2. Filtrar Respondentes (Base Respostas) usando os mesmos critérios
    const filtradosRes = dadosRes.filter(r => 
        (!f.bu || r['BU'] === f.bu) &&
        (!f.n1 || r['Nível 1'] === f.n1) &&
        (!f.n2 || r['Nível 2'] === f.n2) &&
        (!f.n4 || r['Nível 4'] === f.n4) &&
        (!f.lid || r['Liderança - Nome'] === f.lid)
    );

    // 3. Atualizar Números
    const total = filtradosMestre.length;
    const feito = filtradosRes.length;
    const perc = total > 0 ? ((feito / total) * 100).toFixed(1) : 0;

    document.getElementById('txtTotal').innerText = total;
    document.getElementById('txtFeito').innerText = feito;
    document.getElementById('txtPerc').innerText = perc + "%";

    // 4. Renderizar Tabela por Liderança
    const tbody = document.getElementById('corpoTabela');
    tbody.innerHTML = "";
    
    const lideres = [...new Set(filtradosMestre.map(i => i['Liderança - Nome']))].filter(Boolean);
    lideres.forEach(l => {
        const timeTotal = filtradosMestre.filter(i => i['Liderança - Nome'] === l).length;
        const timeFeito = filtradosRes.filter(r => r['Liderança - Nome'] === l).length;
        const p = ((timeFeito / timeTotal) * 100).toFixed(1);

        tbody.innerHTML += `<tr>
            <td><b>${l}</b></td>
            <td>${timeTotal}</td>
            <td>${timeFeito}</td>
            <td>
                <div class="progress-container">
                    <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
                    <span>${p}%</span>
                </div>
            </td>
        </tr>`;
    });
}
</script>
</body>
</html>
