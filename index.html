<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adesão Pesquisa de Clima | Creditas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --green: #8EDB00; --dark: #2D3A4B; --bg: #F4F7F6; --white: #FFFFFF; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 0; }
        .header { background: var(--white); padding: 20px 40px; border-bottom: 4px solid var(--green); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header h1 { margin: 0; font-size: 20px; color: var(--dark); text-transform: uppercase; }
        .container { max-width: 1200px; margin: 25px auto; padding: 0 20px; }
        .card { background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 20px; align-items: flex-end; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 11px; color: #777; text-transform: uppercase; }
        .btn { background: var(--dark); color: var(--green); border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; height: 42px; text-transform: uppercase; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #DDD; background: #FAFAFA; font-size: 13px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 25px 0; }
        .stat-card { background: var(--white); padding: 25px; border-radius: 15px; text-align: center; border-top: 5px solid var(--green); }
        .stat-card h3 { margin: 0; font-size: 12px; color: #888; text-transform: uppercase; }
        .stat-card .value { font-size: 40px; font-weight: 900; margin: 5px 0; color: var(--dark); }
        table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 12px; overflow: hidden; }
        th { background: #F9FAFB; padding: 15px; text-align: left; font-size: 11px; text-transform: uppercase; color: #666; border-bottom: 2px solid #EEE; }
        td { padding: 15px; border-bottom: 1px solid #F1F1F1; font-size: 13px; }
        .bar-bg { background: #EEE; border-radius: 10px; height: 8px; width: 100px; display: inline-block; vertical-align: middle; margin-right: 8px;}
        .bar-fill { background: var(--green); height: 100%; border-radius: 10px; transition: width 0.5s; }
    </style>
</head>
<body>

<div class="header"><h1>Acompanhamento de Adesão - Creditas</h1></div>

<div class="container">
    <div class="card">
        <div class="upload-grid">
            <div><label>1. Base Total (Tripulantes)</label><input type="file" id="upMestre" accept=".csv"></div>
            <div><label>2. Relatório de Respostas</label><input type="file" id="upRes" accept=".csv"></div>
            <button class="btn" onclick="processData()">Atualizar Dashboard</button>
        </div>
    </div>

    <div class="card" id="areaFiltros" style="display:none">
        <div class="filter-grid">
            <div class="filter-group"><label>BU</label><select id="sBU" onchange="updateSubFilters(); calculate()"></select></div>
            <div class="filter-group"><label>Nível 1</label><select id="sN1" onchange="calculate()"></select></div>
            <div class="filter-group"><label>Nível 2</label><select id="sN2" onchange="calculate()"></select></div>
            <div class="filter-group"><label>Nível 3</label><select id="sN3" onchange="calculate()"></select></div>
            <div class="filter-group"><label>Liderança</label><select id="sLid" onchange="calculate()"></select></div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>Público Alvo</h3><div class="value" id="vTotal">0</div></div>
        <div class="stat-card"><h3>Respondidos</h3><div class="value" id="vFeito">0</div></div>
        <div class="stat-card"><h3>% Adesão</h3><div class="value" id="vPerc" style="color:#22863a">0%</div></div>
    </div>

    <div class="card" style="padding:0">
        <table id="mainTable">
            <thead><tr><th>Liderança Direta</th><th>Time Total</th><th>Respondidos</th><th>Adesão (%)</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let rawMestre = [], rawRes = [];

// Função crucial para limpar sujeira de nomes de colunas do CSV/Excel
const cleanKey = (k) => k.replace(/^\uFEFF/, '').trim();
const cleanVal = (v) => v ? v.toString().trim() : "";

async function processData() {
    const f1 = document.getElementById('upMestre').files[0];
    const f2 = document.getElementById('upRes').files[0];
    if(!f1 || !f2) return alert("Selecione os dois arquivos!");

    const parseFile = (file) => new Promise(res => {
        Papa.parse(file, {
            header: true, skipEmptyLines: true, transformHeader: cleanKey,
            complete: results => res(results.data)
        });
    });

    rawMestre = await parseFile(f1);
    rawRes = await parseFile(f2);

    initFilters();
    document.getElementById('areaFiltros').style.display = 'block';
    calculate();
}

function initFilters() {
    fillSelect('sBU', 'BU', rawMestre);
    updateSubFilters();
}

function updateSubFilters() {
    const bu = document.getElementById('sBU').value;
    const data = bu ? rawMestre.filter(i => i.BU === bu) : rawMestre;
    
    fillSelect('sN1', 'Nível 1', data);
    fillSelect('sN2', 'Nível 2', data);
    fillSelect('sN3', 'Nível 3', data);
    fillSelect('sLid', 'Liderança - Nome', data);
}

function fillSelect(id, col, data) {
    const select = document.getElementById(id);
    const unique = [...new Set(data.map(i => cleanVal(i[col])))].filter(v => v && v !== "-").sort();
    select.innerHTML = '<option value="">Todos</option>' + unique.map(v => `<option value="${v}">${v}</option>`).join('');
}

function calculate() {
    const f = {
        bu: document.getElementById('sBU').value,
        n1: document.getElementById('sN1').value,
        n2: document.getElementById('sN2').value,
        n3: document.getElementById('sN3').value,
        lid: document.getElementById('sLid').value
    };

    // 1. Filtrar Base Total (O Denominador)
    const mestreFiltrada = rawMestre.filter(i => 
        (!f.bu || i.BU === f.bu) &&
        (!f.n1 || i['Nível 1'] === f.n1) &&
        (!f.n2 || i['Nível 2'] === f.n2) &&
        (!f.n3 || i['Nível 3'] === f.n3) &&
        (!f.lid || i['Liderança - Nome'] === f.lid)
    );

    // 2. Filtrar Respostas (O Numerador)
    // Nota: Usamos as colunas correspondentes na base de respostas
    const resFiltrada = rawRes.filter(r => 
        (!f.bu || r['BU'] === f.bu) &&
        (!f.n1 || r['Nível 1'] === f.n1) &&
        (!f.n2 || r['Nível 2'] === f.n2) &&
        (!f.n3 || r['Nível 3'] === f.n3) &&
        (!f.lid || r['Liderança - Nome'] === f.lid)
    );

    document.getElementById('vTotal').innerText = mestreFiltrada.length;
    document.getElementById('vFeito').innerText = resFiltrada.length;
    const pGlobal = mestreFiltrada.length ? (resFiltrada.length / mestreFiltrada.length * 100).toFixed(1) : 0;
    document.getElementById('vPerc').innerText = pGlobal + '%';

    // 3. Gerar Tabela por Líder
    const tbody = document.querySelector('#mainTable tbody');
    tbody.innerHTML = "";
    const lideres = [...new Set(mestreFiltrada.map(i => i['Liderança - Nome']))].filter(Boolean);

    lideres.forEach(l => {
        const tTotal = mestreFiltrada.filter(i => i['Liderança - Nome'] === l).length;
        const tFeito = resFiltrada.filter(r => r['Liderança - Nome'] === l).length;
        const p = (tFeito / tTotal * 100).toFixed(1);
        
        tbody.innerHTML += `<tr>
            <td><b>${l}</b></td>
            <td>${tTotal}</td>
            <td>${tFeito}</td>
            <td><div class="bar-bg"><div class="bar-fill" style="width:${p}%"></div></div> <b>${p}%</b></td>
        </tr>`;
    });
}
</script>
</body>
</html>
