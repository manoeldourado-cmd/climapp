<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adesão Pesquisa de Clima - Creditas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --green: #00ff5f; --bg: #121212; --card: #1e1e1e; --text: #ffffff; --row-hover: #252525; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        .header { border-bottom: 2px solid var(--green); padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 1.8rem; letter-spacing: -1px; }
        
        /* Upload Area */
        .upload-area { background: var(--card); padding: 25px; border-radius: 12px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)) auto; gap: 20px; align-items: end; margin-bottom: 25px; border: 1px solid #333; }
        .file-input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #aaa; font-weight: bold; }
        input[type="file"] { background: #2a2a2a; padding: 8px; border-radius: 6px; border: 1px solid #444; width: 100%; box-sizing: border-box; }
        
        .btn-update { background: var(--green); color: #000; border: none; padding: 12px 25px; border-radius: 6px; font-weight: 800; cursor: pointer; transition: transform 0.2s, opacity 0.2s; height: 45px; text-transform: uppercase; }
        .btn-update:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Filtros */
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .filter-item label { display: block; font-size: 0.75rem; color: var(--green); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        select { background: #2a2a2a; color: white; border: 1px solid #444; padding: 10px; border-radius: 6px; width: 100%; cursor: pointer; font-size: 0.9rem; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 15px; text-align: center; border-bottom: 4px solid #333; transition: border-color 0.3s; }
        .stat-card:hover { border-color: var(--green); }
        .stat-card h3 { margin: 0; font-size: 0.9rem; color: #888; text-transform: uppercase; }
        .stat-card .value { font-size: 2.8rem; font-weight: 800; margin: 10px 0; color: #fff; }
        .stat-card .label { font-size: 0.8rem; color: var(--green); }

        /* Table */
        .table-container { background: var(--card); border-radius: 12px; border: 1px solid #333; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #252525; padding: 15px; text-align: left; color: var(--green); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #2a2a2a; font-size: 0.95rem; }
        tr:hover { background: var(--row-hover); }
        
        .progress-box { display: flex; align-items: center; gap: 12px; width: 200px; }
        .bar-bg { background: #333; height: 8px; border-radius: 10px; flex-grow: 1; overflow: hidden; }
        .bar-fill { background: var(--green); height: 100%; border-radius: 10px; transition: width 0.8s cubic-bezier(0.1, 0.5, 0.5, 1); }
        .perc-text { font-weight: bold; min-width: 45px; font-size: 0.85rem; }
        
        .empty-state { padding: 40px; text-align: center; color: #666; }
    </style>
</head>
<body>

<div class="header">
    <h1>ADESÃO PESQUISA DE CLIMA</h1>
    <div id="lastUpdate" style="font-size: 0.8rem; color: #666;"></div>
</div>

<div class="upload-area">
    <div class="file-input-group">
        <label>1. BASE TOTAL (Tripulantes)</label>
        <input type="file" id="csvMestre" accept=".csv">
    </div>
    <div class="file-input-group">
        <label>2. RESPOSTAS (Adesão)</label>
        <input type="file" id="csvRes" accept=".csv">
    </div>
    <button class="btn-update" onclick="loadData()">Processar</button>
</div>

<div class="filters-grid" id="filterArea" style="display:none;">
    <div class="filter-item"><label>BU</label><select id="selBU" onchange="apply()"></select></div>
    <div class="filter-item"><label>Nível 1</label><select id="selN1" onchange="apply()"></select></div>
    <div class="filter-item"><label>Nível 2</label><select id="selN2" onchange="apply()"></select></div>
    <div class="filter-item"><label>Liderança</label><select id="selLid" onchange="apply()"></select></div>
</div>

<div class="stats-grid">
    <div class="stat-card"><h3>Público Alvo</h3><div class="value" id="countTotal">0</div><div class="label">Tripulantes</div></div>
    <div class="stat-card"><h3>Respondidos</h3><div class="value" id="countRes">0</div><div class="label">Participações</div></div>
    <div class="stat-card"><h3>Adesão Atual</h3><div class="value" id="countPerc">0%</div><div class="label" id="statusLabel">Aguardando dados</div></div>
</div>

<div class="table-container">
    <table id="tableLid">
        <thead>
            <tr>
                <th>Liderança Direta</th>
                <th>Time Total</th>
                <th>Respostas</th>
                <th>Adesão (%)</th>
            </tr>
        </thead>
        <tbody id="tbody">
            <tr><td colspan="4" class="empty-state">Faça o upload dos arquivos para visualizar o detalhamento.</td></tr>
        </tbody>
    </table>
</div>

<script>
let mestreRaw = [], respostasRaw = [];

// Função para normalizar texto (remover acentos e espaços extras)
const normalize = (text) => {
    if (!text) return "";
    return text.toString().toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .trim();
};

async function loadData() {
    const fMestre = document.getElementById('csvMestre').files[0];
    const fRes = document.getElementById('csvRes').files[0];

    if (!fMestre || !fRes) return alert("Selecione os dois arquivos CSV!");

    mestreRaw = await parseCSV(fMestre);
    respostasRaw = await parseCSV(fRes);

    buildFilters();
    document.getElementById('filterArea').style.display = 'grid';
    document.getElementById('lastUpdate').innerText = "Última atualização: " + new Date().toLocaleTimeString();
    apply();
}

function parseCSV(file) {
    return new Promise(resolve => {
        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: res => resolve(res.data)
        });
    });
}

function buildFilters() {
    const filters = [
        { id: 'selBU', col: 'BU' },
        { id: 'selN1', col: 'Nível 1' },
        { id: 'selN2', col: 'Nível 2' },
        { id: 'selLid', col: 'Liderança - Nome' }
    ];

    filters.forEach(f => {
        const select = document.getElementById(f.id);
        const uniqueValues = [...new Set(mestreRaw.map(item => item[f.col]))].filter(Boolean).sort();
        select.innerHTML = `<option value="">Todos</option>` + 
            uniqueValues.map(v => `<option value="${v}">${v}</option>`).join('');
    });
}

function apply() {
    const fBU = document.getElementById('selBU').value;
    const fN1 = document.getElementById('selN1').value;
    const fN2 = document.getElementById('selN2').value;
    const fLid = document.getElementById('selLid').value;

    // 1. Filtrar Base Total
    const filteredMestre = mestreRaw.filter(i => 
        (!fBU || i['BU'] === fBU) &&
        (!fN1 || i['Nível 1'] === fN1) &&
        (!fN2 || i['Nível 2'] === fN2) &&
        (!fLid || i['Liderança - Nome'] === fLid)
    );

    // 2. Mapear Respondentes Únicos (Normalizados)
    // Usamos o nome do Líder que aparece no arquivo de respostas para cruzar
    const respondentes = respostasRaw.map(r => normalize(r['Filtro_lider_direto']));

    // 3. Contagem de Respondidos dentro do filtro
    // Um tripulante é considerado "respondido" se o nome da liderança dele está na lista de respondentes
    // Nota: Como os dados de respostas são anônimos por respondente, o cruzamento é feito pela volumetria da liderança.
    
    let totalFiltrado = filteredMestre.length;
    
    // Para o cálculo global do dashboard
    const respondidosCount = respostasRaw.filter(r => {
        const lidRes = normalize(r['Filtro_lider_direto']);
        // Verifica se esse respondente pertence ao grupo filtrado da Base Total
        return filteredMestre.some(m => normalize(m['Liderança - Nome']) === lidRes);
    }).length;

    // Atualizar UI
    document.getElementById('countTotal').innerText = totalFiltrado;
    document.getElementById('countRes').innerText = respondidosCount;
    
    const globalPerc = totalFiltrado > 0 ? (respondidosCount / totalFiltrado * 100).toFixed(1) : 0;
    document.getElementById('countPerc').innerText = globalPerc + "%";
    document.getElementById('statusLabel').innerText = globalPerc >= 80 ? "Meta Atingida" : "Em progresso";

    // 4. Renderizar Tabela
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = "";
    
    const lideresUnicos = [...new Set(filteredMestre.map(i => i['Liderança - Nome']))];

    lideresUnicos.forEach(lidNome => {
        const totalNoTime = mestreRaw.filter(m => m['Liderança - Nome'] === lidNome).length;
        const respostasNoTime = respostasRaw.filter(r => normalize(r['Filtro_lider_direto']) === normalize(lidNome)).length;
        const perc = totalNoTime > 0 ? (respostasNoTime / totalNoTime * 100).toFixed(1) : 0;

        tbody.innerHTML += `
            <tr>
                <td>${lidNome}</td>
                <td>${totalNoTime}</td>
                <td>${respostasNoTime}</td>
                <td>
                    <div class="progress-box">
                        <div class="bar-bg"><div class="bar-fill" style="width: ${perc}%"></div></div>
                        <span class="perc-text">${perc}%</span>
                    </div>
                </td>
            </tr>
        `;
    });
}
</script>
</body>
</html>
