<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Adesão | Creditas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --green: #8EDB00; --dark: #2D3A4B; --bg: #F4F7F6; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 20px; }
        .header { background: white; padding: 20px; border-bottom: 4px solid var(--green); margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 20px; align-items: end; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .btn-process { background: var(--dark); color: var(--green); border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; border-top: 4px solid var(--green); }
        .stat-card h3 { font-size: 14px; color: #888; margin: 0; }
        .stat-card div { font-size: 36px; font-weight: bold; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #EEE; }
        th { background: #F8F9FA; color: #666; font-size: 12px; text-transform: uppercase; }
        .bar-bg { background: #EEE; border-radius: 10px; height: 10px; width: 100px; display: inline-block; margin-right: 10px; }
        .bar-fill { background: var(--green); height: 100%; border-radius: 10px; transition: width 0.5s; }
    </style>
</head>
<body>

<div class="header"><h1>Acompanhamento de Adesão 2026</h1></div>

<div class="container">
    <div class="card">
        <div class="upload-grid">
            <div><label>1. Base Total (CSV)</label><br><input type="file" id="fileMestre"></div>
            <div><label>2. Base Respostas (CSV)</label><br><input type="file" id="fileRes"></div>
            <button class="btn-process" onclick="processar()">ATUALIZAR DASHBOARD</button>
        </div>
    </div>

    <div class="card" id="areaFiltros" style="display:none">
        <div class="filter-grid">
            <div><label>BU</label><select id="fBU" onchange="calcular()"></select></div>
            <div><label>Nível 1</label><select id="fN1" onchange="calcular()"></select></div>
            <div><label>Nível 2</label><select id="fN2" onchange="calcular()"></select></div>
            <div><label>Nível 3</label><select id="fN3" onchange="calcular()"></select></div>
            <div><label>Liderança</label><select id="fLid" onchange="calcular()"></select></div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>Público Total</h3><div id="txtTotal">0</div></div>
        <div class="stat-card"><h3>Respondidos</h3><div id="txtFez">0</div></div>
        <div class="stat-card"><h3>Adesão %</h3><div id="txtPerc" style="color:var(--green)">0%</div></div>
    </div>

    <div class="card" style="padding:0">
        <table id="mainTable">
            <thead><tr><th>Liderança / Grupo</th><th>Total Time</th><th>Adesão</th><th>Progresso</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let mestre = [], respostas = [];

// Função para limpar nomes de colunas e textos (remove espaços e lixo do Excel)
function clean(t) { return t ? t.toString().trim() : ""; }
function norm(t) { return clean(t).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); }

async function processar() {
    const f1 = document.getElementById('fileMestre').files[0];
    const f2 = document.getElementById('fileRes').files[0];
    if(!f1 || !f2) return alert("Selecione os dois arquivos CSV!");

    const parse = (file) => new Promise(r => Papa.parse(file, { 
        header: true, 
        skipEmptyLines: true, 
        delimiter: ";", // Forçado para seu arquivo
        complete: res => r(res.data) 
    }));

    mestre = await parse(f1);
    respostas = await parse(f2);

    popularFiltros();
    document.getElementById('areaFiltros').style.display = 'block';
    calcular();
}

function popularFiltros() {
    const mapping = { 'fBU': 'BU', 'fN1': 'Nível 1', 'fN2': 'Nível 2', 'fN3': 'Nível 3', 'fLid': 'Liderança - Nome' };
    for (let id in mapping) {
        const select = document.getElementById(id);
        const col = mapping[id];
        const options = [...new Set(mestre.map(i => clean(i[col])))].filter(Boolean).sort();
        select.innerHTML = '<option value="">Todos</option>' + options.map(o => `<option value="${o}">${o}</option>`).join('');
    }
}

function calcular() {
    const filters = {
        bu: document.getElementById('fBU').value,
        n1: document.getElementById('fN1').value,
        n2: document.getElementById('fN2').value,
        n3: document.getElementById('fN3').value,
        lid: document.getElementById('fLid').value
    };

    // 1. Filtrar Base Mestra
    const baseFiltrada = mestre.filter(i => {
        return (!filters.bu || clean(i['BU']) === filters.bu) &&
               (!filters.n1 || clean(i['Nível 1']) === filters.n1) &&
               (!filters.n2 || clean(i['Nível 2']) === filters.n2) &&
               (!filters.n3 || clean(i['Nível 3']) === filters.n3) &&
               (!filters.lid || clean(i['Liderança - Nome']) === filters.lid);
    });

    // 2. Filtrar Respostas (Numerador)
    // No seu arquivo de respostas as colunas são "Filtro_bu", "Filtro_nível_1", etc.
    const resFiltradas = respostas.filter(r => {
        const mBU = !filters.bu || norm(r['Filtro_bu']) === norm(filters.bu);
        const mN1 = !filters.n1 || norm(r['Filtro_nível_1']) === norm(filters.n1);
        const mLid = !filters.lid || norm(r['Filtro_lider_direto']) === norm(filters.lid);
        return mBU && mN1 && mLid;
    });

    document.getElementById('txtTotal').innerText = baseFiltrada.length;
    document.getElementById('txtFez').innerText = resFiltradas.length;
    const perc = baseFiltrada.length ? (resFiltradas.length / baseFiltrada.length * 100).toFixed(1) : 0;
    document.getElementById('txtPerc').innerText = perc + "%";

    // 3. Render Tabela por Líder
    const tbody = document.querySelector('#mainTable tbody');
    tbody.innerHTML = "";
    const lideres = [...new Set(baseFiltrada.map(i => clean(i['Liderança - Nome'])))].filter(Boolean);

    lideres.forEach(l => {
        const timeTotal = mestre.filter(i => clean(i['Liderança - Nome']) === l).length;
        const timeFeito = respostas.filter(r => norm(r['Filtro_lider_direto']) === norm(l)).length;
        const pL = (timeFeito / timeTotal * 100).toFixed(1);
        tbody.innerHTML += `<tr><td>${l}</td><td>${timeTotal}</td><td>${timeFeito}</td><td><div class="bar-bg"><div class="bar-fill" style="width:${pL}%"></div></div> ${pL}%</td></tr>`;
    });
}
</script>
</body>
</html>
