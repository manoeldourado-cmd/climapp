<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adesão Pesquisa de Clima | Creditas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --green: #8EDB00; --dark: #2D3A4B; --bg: #F4F7F6; --white: #FFFFFF; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 0; }
        .header { background: var(--white); padding: 20px 40px; border-bottom: 4px solid var(--green); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        
        /* Área de Upload */
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 20px; align-items: end; }
        .btn-process { background: var(--dark); color: var(--green); border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* Filtros */
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .filter-group label { display: block; font-size: 11px; font-weight: bold; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #CCC; background: #FFF; font-size: 13px; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; }
        .stat-card { background: var(--white); padding: 25px; border-radius: 12px; text-align: center; border-top: 5px solid var(--green); }
        .stat-card .value { font-size: 42px; font-weight: 900; color: var(--dark); }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 12px; overflow: hidden; }
        th { background: #F8F9FA; padding: 15px; text-align: left; font-size: 12px; color: #666; border-bottom: 2px solid #EEE; }
        td { padding: 15px; border-bottom: 1px solid #EEE; font-size: 14px; }
        .progress-bar { background: #EEE; border-radius: 10px; height: 8px; width: 100px; display: inline-block; margin-right: 10px; }
        .progress-fill { background: var(--green); height: 100%; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header"><h1>Monitoramento de Adesão</h1></div>

<div class="container">
    <div class="card">
        <div class="upload-grid">
            <div><label>1. Base Total (CSV)</label><input type="file" id="fileMestre"></div>
            <div><label>2. Base Respostas (CSV)</label><input type="file" id="fileRes"></div>
            <button class="btn-process" onclick="processar()">ATUALIZAR DASHBOARD</button>
        </div>
    </div>

    <div class="card" id="filterArea" style="display:none">
        <div class="filter-grid">
            <div class="filter-group"><label>BU</label><select id="fBU" onchange="calcular()"></select></div>
            <div class="filter-group"><label>Nível 1</label><select id="fN1" onchange="calcular()"></select></div>
            <div class="filter-group"><label>Nível 2</label><select id="fN2" onchange="calcular()"></select></div>
            <div class="filter-group"><label>Nível 3</label><select id="fN3" onchange="calcular()"></select></div>
            <div class="filter-group"><label>Liderança</label><select id="fLid" onchange="calcular()"></select></div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>Total Tripulantes</h3><div class="value" id="resTotal">0</div></div>
        <div class="stat-card"><h3>Respondidos</h3><div class="value" id="resFez">0</div></div>
        <div class="stat-card"><h3>Adesão %</h3><div class="value" id="resPerc" style="color:var(--green)">0%</div></div>
    </div>

    <div class="card" style="padding:0">
        <table id="mainTable">
            <thead><tr><th>Liderança / Grupo</th><th>Total</th><th>Adesão</th><th>Progresso</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let mestre = [], respostas = [];

async function processar() {
    const f1 = document.getElementById('fileMestre').files[0];
    const f2 = document.getElementById('fileRes').files[0];
    if(!f1 || !f2) return alert("Selecione os dois arquivos CSV");

    mestre = await parseCSV(f1);
    respostas = await parseCSV(f2);

    setupFilters();
    document.getElementById('filterArea').style.display = 'block';
    calcular();
}

function parseCSV(file) {
    return new Promise(resolve => {
        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: r => resolve(r.data)
        });
    });
}

function setupFilters() {
    const filters = [
        { id: 'fBU', col: 'BU' },
        { id: 'fN1', col: 'Nível 1' },
        { id: 'fN2', col: 'Nível 2' },
        { id: 'fN3', col: 'Nível 3' },
        { id: 'fLid', col: 'Liderança - Nome' }
    ];

    filters.forEach(f => {
        const select = document.getElementById(f.id);
        // Limpeza de nomes de colunas para evitar erros de espaços invisíveis
        const realColName = Object.keys(mestre[0]).find(k => k.trim() === f.col) || f.col;
        const items = [...new Set(mestre.map(i => i[realColName]))].filter(Boolean).sort();
        select.innerHTML = '<option value="">Todos</option>' + items.map(v => `<option value="${v}">${v}</option>`).join('');
    });
}

function normalize(t) { return t ? t.toString().toLowerCase().trim() : ""; }

function calcular() {
    const filters = {
        bu: document.getElementById('fBU').value,
        n1: document.getElementById('fN1').value,
        n2: document.getElementById('fN2').value,
        n3: document.getElementById('fN3').value,
        lid: document.getElementById('fLid').value
    };

    // 1. Filtrar Base Mestra (Quem deveria responder)
    const mestreFiltrada = mestre.filter(i => {
        return (!filters.bu || i['BU'] === filters.bu) &&
               (!filters.n1 || i['Nível 1'] === filters.n1) &&
               (!filters.n2 || i['Nível 2'] === filters.n2) &&
               (!filters.n3 || i['Nível 3'] === filters.n3) &&
               (!filters.lid || i['Liderança - Nome'] === filters.lid);
    });

    // 2. Filtrar Base de Respostas (Quem realmente respondeu)
    // Usamos as colunas "Filtro_" do arquivo de respostas fornecido
    const respostasFiltradas = respostas.filter(r => {
        const matchBU = !filters.bu || normalize(r['Filtro_bu']) === normalize(filters.bu);
        const matchN1 = !filters.n1 || normalize(r['Filtro_nível_1']) === normalize(filters.n1);
        const matchN2 = !filters.n2 || normalize(r['Filtro_nível_2']) === normalize(filters.n2);
        const matchLid = !filters.lid || normalize(r['Filtro_lider_direto']) === normalize(filters.lid);
        return matchBU && matchN1 && matchN2 && matchLid;
    });

    // 3. Atualizar Totais
    document.getElementById('resTotal').innerText = mestreFiltrada.length;
    document.getElementById('resFez').innerText = respostasFiltradas.length;
    const perc = mestreFiltrada.length ? (respostasFiltradas.length / mestreFiltrada.length * 100).toFixed(1) : 0;
    document.getElementById('resPerc').innerText = perc + "%";

    // 4. Gerar Tabela detalhada
    const tbody = document.querySelector('#mainTable tbody');
    tbody.innerHTML = "";
    const lideres = [...new Set(mestreFiltrada.map(i => i['Liderança - Nome']))].filter(Boolean);

    lideres.forEach(l => {
        const totalNoTime = mestre.filter(i => i['Liderança - Nome'] === l).length;
        const resNoTime = respostas.filter(r => normalize(r['Filtro_lider_direto']) === normalize(l)).length;
        const p = ((resNoTime / totalNoTime) * 100).toFixed(1);
        
        tbody.innerHTML += `<tr>
            <td><b>${l}</b></td>
            <td>${totalNoTime}</td>
            <td>${resNoTime}</td>
            <td>
                <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
                <span>${p}%</span>
            </td>
        </tr>`;
    });
}
</script>
</body>
</html>
