<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adesão Pesquisa de Clima | Creditas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --green: #8EDB00; --dark: #2D3A4B; --bg: #F4F7F6; }
        body { font-family: Arial, sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 20px; }
        .header { background: white; padding: 20px; border-bottom: 4px solid var(--green); margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 20px; align-items: end; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .btn-process { background: var(--dark); color: var(--green); border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; border-top: 4px solid var(--green); }
        .stat-card div { font-size: 32px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #EEE; }
        th { background: #F8F9FA; color: #666; font-size: 12px; text-transform: uppercase; }
        .bar-bg { background: #EEE; border-radius: 10px; height: 8px; width: 100px; display: inline-block; }
        .bar-fill { background: var(--green); height: 100%; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header"><h1>Dashboard de Adesão Creditas</h1></div>

<div class="container">
    <div class="card">
        <div class="upload-grid">
            <div><label>1. Base Total (CSV)</label><br><input type="file" id="fileMestre"></div>
            <div><label>2. Base Respostas (CSV)</label><br><input type="file" id="fileRes"></div>
            <button class="btn-process" onclick="processar()">ATUALIZAR DADOS</button>
        </div>
    </div>

    <div class="card" id="areaFiltros" style="display:none">
        <div class="filter-grid">
            <div><label>BU</label><select id="fBU" onchange="calcular()"></select></div>
            <div><label>Nível 1</label><select id="fN1" onchange="calcular()"></select></div>
            <div><label>Nível 2</label><select id="fN2" onchange="calcular()"></select></div>
            <div><label>Nível 3</label><select id="fN3" onchange="calcular()"></select></div>
            <div><label>Liderança</label><select id="fLid" onchange="calcular()"></select></div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>Público Total</h3><div id="txtTotal">0</div></div>
        <div class="stat-card"><h3>Respondidos</h3><div id="txtFez">0</div></div>
        <div class="stat-card"><h3>Adesão %</h3><div id="txtPerc" style="color:var(--green)">0%</div></div>
    </div>

    <div class="card" style="padding:0">
        <table id="mainTable">
            <thead><tr><th>Liderança / Grupo</th><th>Pessoas</th><th>Respostas</th><th>Adesão</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let mestre = [], respostas = [];

function normalize(t) { return t ? t.toString().toLowerCase().trim() : ""; }

async function processar() {
    const f1 = document.getElementById('fileMestre').files[0];
    const f2 = document.getElementById('fileRes').files[0];
    if(!f1 || !f2) return alert("Selecione os dois arquivos!");

    // PapaParse com Delimiter auto-detect
    const parse = (file) => new Promise(r => Papa.parse(file, { header: true, skipEmptyLines: true, complete: res => r(res.data) }));

    mestre = await parse(f1);
    respostas = await parse(f2);

    popularFiltros();
    document.getElementById('areaFiltros').style.display = 'block';
    calcular();
}

function popularFiltros() {
    const configs = [
        { id: 'fBU', col: 'BU' },
        { id: 'fN1', col: 'Nível 1' },
        { id: 'fN2', col: 'Nível 2' },
        { id: 'fN3', col: 'Nível 3' },
        { id: 'fLid', col: 'Liderança - Nome' }
    ];

    configs.forEach(conf => {
        const select = document.getElementById(conf.id);
        const options = [...new Set(mestre.map(i => i[conf.col]))].filter(Boolean).sort();
        select.innerHTML = '<option value="">Todos</option>' + options.map(o => `<option value="${o}">${o}</option>`).join('');
    });
}

function calcular() {
    const filtros = {
        bu: document.getElementById('fBU').value,
        n1: document.getElementById('fN1').value,
        n2: document.getElementById('fN2').value,
        n3: document.getElementById('fN3').value,
        lid: document.getElementById('fLid').value
    };

    // 1. Filtrar Base Total (QUEM DEVERIA RESPONDER)
    const baseFiltrada = mestre.filter(i => {
        return (!filtros.bu || i['BU'] === filtros.bu) &&
               (!filtros.n1 || i['Nível 1'] === filtros.n1) &&
               (!filtros.n2 || i['Nível 2'] === filtros.n2) &&
               (!filtros.n3 || i['Nível 3'] === filtros.n3) &&
               (!filtros.lid || i['Liderança - Nome'] === filtros.lid);
    });

    // 2. Filtrar Base Respostas (QUEM RESPONDEU) baseando-se nos filtros selecionados
    // Cruza o valor selecionado nos filtros com os campos "Filtro_" do seu arquivo
    const resFiltradas = respostas.filter(r => {
        const matchBU = !filtros.bu || normalize(r['Filtro_bu']) === normalize(filtros.bu);
        const matchN1 = !filtros.n1 || normalize(r['Filtro_nível_1']) === normalize(filtros.n1);
        const matchN2 = !filtros.n2 || normalize(r['Filtro_nível_2']) === normalize(filtros.n2);
        const matchN3 = !filtros.n3 || normalize(r['Filtro_nível_3']) === normalize(filtros.n3);
        const matchLid = !filtros.lid || normalize(r['Filtro_lider_direto']) === normalize(filtros.lid);
        return matchBU && matchN1 && matchN2 && matchN3 && matchLid;
    });

    // 3. Update UI
    document.getElementById('txtTotal').innerText = baseFiltrada.length;
    document.getElementById('txtFez').innerText = resFiltradas.length;
    const perc = baseFiltrada.length ? (resFiltradas.length / baseFiltrada.length * 100).toFixed(1) : 0;
    document.getElementById('txtPerc').innerText = perc + "%";

    // 4. Render Table por Liderança dentro do contexto filtrado
    const tbody = document.querySelector('#mainTable tbody');
    tbody.innerHTML = "";
    const lideres = [...new Set(baseFiltrada.map(i => i['Liderança - Nome']))].filter(Boolean);

    lideres.forEach(l => {
        const totalL = mestre.filter(i => i['Liderança - Nome'] === l).length;
        const feitoL = respostas.filter(r => normalize(r['Filtro_lider_direto']) === normalize(l)).length;
        const pL = (feitoL / totalL * 100).toFixed(1);

        tbody.innerHTML += `<tr>
            <td><b>${l}</b></td>
            <td>${totalL}</td>
            <td>${feitoL}</td>
            <td>
                <div class="bar-bg"><div class="bar-fill" style="width:${pL}%"></div></div>
                <span style="font-size:12px">${pL}%</span>
            </td>
        </tr>`;
    });
}
</script>
</body>
</html>
