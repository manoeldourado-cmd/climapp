<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adesão Pesquisa de Clima | Creditas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --creditas-green: #8EDB00;
            --dark-gray: #2D3A4B;
            --light-bg: #F4F7F6;
            --white: #FFFFFF;
            --border-color: #E0E4E8;
            --text-main: #333333;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: var(--white);
            padding: 20px 40px;
            border-bottom: 4px solid var(--creditas-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .header h1 { margin: 0; font-size: 22px; color: var(--dark-gray); text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

        /* Upload Box */
        .upload-card {
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 20px;
            align-items: flex-end;
        }

        .file-input-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 13px; color: var(--dark-gray); }
        input[type="file"] { border: 1px solid var(--border-color); padding: 8px; border-radius: 6px; width: 100%; cursor: pointer; }

        .btn-process {
            background-color: var(--dark-gray);
            color: var(--creditas-green);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-process:hover { background-color: #1a232c; transform: translateY(-2px); }

        /* Filters Section */
        .filter-section {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            border: 1px solid var(--border-color);
        }

        .filter-group label { display: block; font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: #fafafa;
            font-size: 14px;
        }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border-top: 5px solid var(--creditas-green);
        }
        .stat-card h3 { margin: 0; font-size: 14px; color: #777; text-transform: uppercase; }
        .stat-card .value { font-size: 48px; font-weight: 900; margin: 10px 0; color: var(--dark-gray); }

        /* Table */
        .table-card { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #F9FAFB; padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; color: #666; border-bottom: 2px solid var(--border-color); }
        td { padding: 15px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        tr:hover { background-color: #FDFDFD; }

        .progress-bar-container { display: flex; align-items: center; gap: 10px; }
        .progress-bar { background: #E0E0E0; border-radius: 10px; height: 10px; width: 120px; overflow: hidden; }
        .progress-fill { background: var(--creditas-green); height: 100%; border-radius: 10px; transition: width 0.6s ease; }
        .badge { font-weight: bold; padding: 4px 8px; border-radius: 5px; font-size: 12px; }
        .high { background: #e6ffed; color: #22863a; }
        .low { background: #fff5f5; color: #cb2431; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard de Adesão | Pesquisa de Clima</h1>
    </div>

    <div class="container">
        <div class="upload-card">
            <div class="file-input-group">
                <label>1. BASE TOTAL (.CSV)</label>
                <input type="file" id="fileBase" accept=".csv">
            </div>
            <div class="file-input-group">
                <label>2. RELATÓRIO RESPOSTAS (.CSV)</label>
                <input type="file" id="fileRes" accept=".csv">
            </div>
            <button class="btn-process" onclick="processarArquivos()">CARREGAR DASHBOARD</button>
        </div>

        <div class="filter-section" id="filterArea" style="display: none;">
            <div class="filter-group"><label>BU</label><select id="selBU" onchange="filtroAlterado()"></select></div>
            <div class="filter-group"><label>Nível 1</label><select id="selN1" onchange="filtroAlterado()"></select></div>
            <div class="filter-group"><label>Nível 2</label><select id="selN2" onchange="filtroAlterado()"></select></div>
            <div class="filter-group"><label>Nível 3</label><select id="selN3" onchange="filtroAlterado()"></select></div>
            <div class="filter-group"><label>Liderança</label><select id="selLid" onchange="filtroAlterado()"></select></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>Público Total</h3><div class="value" id="valTotal">0</div></div>
            <div class="stat-card"><h3>Respondidos</h3><div class="value" id="valRes">0</div></div>
            <div class="stat-card"><h3>% Adesão</h3><div class="value" id="valPerc" style="color: var(--creditas-green);">0%</div></div>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Liderança / Grupo</th>
                        <th>Total de Pessoas</th>
                        <th>Adesão Realizada</th>
                        <th>% de Engajamento</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4" style="text-align: center; color: #999; padding: 40px;">Suba os arquivos para ver os dados.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let baseTotal = [];
        let baseRespostas = [];

        function processarArquivos() {
            const f1 = document.getElementById('fileBase').files[0];
            const f2 = document.getElementById('fileRes').files[0];

            if(!f1 || !f2) return alert("Anexe as duas bases para continuar.");

            Papa.parse(f1, {
                header: true, skipEmptyLines: true,
                complete: function(results) {
                    baseTotal = results.data;
                    Papa.parse(f2, {
                        header: true, skipEmptyLines: true,
                        complete: function(res) {
                            baseRespostas = res.data;
                            inicializarFiltros();
                            document.getElementById('filterArea').style.display = 'grid';
                            calcular();
                        }
                    });
                }
            });
        }

        function inicializarFiltros() {
            popularDropdown('selBU', 'BU');
            popularDropdown('selN1', 'Nível 1');
            popularDropdown('selN2', 'Nível 2');
            popularDropdown('selN3', 'Nível 3');
            popularDropdown('selLid', 'Liderança - Nome');
        }

        function popularDropdown(elementId, columnName) {
            const select = document.getElementById(elementId);
            const values = [...new Set(baseTotal.map(i => i[columnName]))].filter(Boolean).sort();
            select.innerHTML = '<option value="">Todos</option>' + values.map(v => `<option value="${v}">${v}</option>`).join('');
        }

        function filtroAlterado() {
            // Implementação simples de filtros encadeados baseada na Base Total
            const bu = document.getElementById('selBU').value;
            const n1 = document.getElementById('selN1').value;
            
            // Se mudar a BU, poderíamos limpar ou restringir os outros, 
            // mas por agora vamos manter a lógica de interseção global para não travar a experiência.
            calcular();
        }

        function normalizar(txt) {
            return txt ? txt.toString().toLowerCase().trim() : "";
        }

        function calcular() {
            const fBU = document.getElementById('selBU').value;
            const fN1 = document.getElementById('selN1').value;
            const fN2 = document.getElementById('selN2').value;
            const fN3 = document.getElementById('selN3').value;
            const fLid = document.getElementById('selLid').value;

            // Filtrar Base Total (O "Denominador")
            const filtradosTotal = baseTotal.filter(i => {
                return (!fBU || i['BU'] === fBU) &&
                       (!fN1 || i['Nível 1'] === fN1) &&
                       (!fN2 || i['Nível 2'] === fN2) &&
                       (!fN3 || i['Nível 3'] === fN3) &&
                       (!fLid || i['Liderança - Nome'] === fLid);
            });

            // Filtrar Base Respostas (O "Numerador")
            // Mapeamos os campos equivalentes no arquivo de respostas
            const filtradosRes = baseRespostas.filter(r => {
                const matchBU = !fBU || normalizar(r['Filtro_bu']) === normalizar(fBU);
                const matchN1 = !fN1 || normalizar(r['Filtro_nível_1']) === normalizar(fN1);
                const matchN2 = !fN2 || normalizar(r['Filtro_nível_2']) === normalizar(fN2);
                const matchN3 = !fN3 || normalizar(r['Filtro_nível_3']) === normalizar(fN3);
                const matchLid = !fLid || normalizar(r['Filtro_lider_direto']) === normalizar(fLid);
                return matchBU && matchN1 && matchN2 && matchN3 && matchLid;
            });

            // Update Cards
            const totalCount = filtradosTotal.length;
            const resCount = filtradosRes.length;
            const perc = totalCount > 0 ? (resCount / totalCount * 100).toFixed(1) : 0;

            document.getElementById('valTotal').innerText = totalCount;
            document.getElementById('valRes').innerText = resCount;
            document.getElementById('valPerc').innerText = perc + "%";

            // Update Table by Leadership
            renderizarTabela(filtradosTotal);
        }

        function renderizarTabela(dadosFiltrados) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";

            // Agrupa por líder dentro da seleção atual
            const lideres = [...new Set(dadosFiltrados.map(i => i['Liderança - Nome']))].filter(Boolean);

            if (lideres.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 20px;">Nenhum dado encontrado.</td></tr>';
                return;
            }

            lideres.forEach(lider => {
                const totalNoTime = baseTotal.filter(i => i['Liderança - Nome'] === lider).length;
                const resNoTime = baseRespostas.filter(r => normalizar(r['Filtro_lider_direto']) === normalizar(lider)).length;
                const perc = totalNoTime > 0 ? (resNoTime / totalNoTime * 100).toFixed(1) : 0;

                const row = `
                    <tr>
                        <td><b>${lider}</b></td>
                        <td>${totalNoTime}</td>
                        <td>${resNoTime}</td>
                        <td>
                            <div class="progress-bar-container">
                                <div class="progress-bar"><div class="progress-fill" style="width: ${perc}%"></div></div>
                                <span class="badge ${perc >= 80 ? 'high' : 'low'}">${perc}%</span>
                            </div>
                        </td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }
    </script>
</body>
</html>
